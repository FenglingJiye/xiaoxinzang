<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小心脏 - 数字猫猫的家</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to bottom, #fff7f0, #ffeef2);
      overflow: hidden;
      font-family: "Microsoft YaHei", "Helvetica Neue", sans-serif;
      color: #333;
      text-align: center;
    }

    /* 爱心容器整体跳动 */
.heart-container {
      position: relative;
      animation: pulse 1.4s infinite ease-in-out;
      cursor: pointer;
    }

    /* CSS绘制爱心 */
.heart {
      width: 150px;
      height: 150px;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
      position: relative;
      transform: rotate(-45deg);
      box-shadow: 0 0 40px rgba(255, 154, 158, 0.6);
    }
.heart::before,
.heart::after {
      content: "";
      width: 150px;
      height: 150px;
      background: inherit;
      border-radius: 50%;
      position: absolute;
    }
.heart::before {
      top: -75px;
      left: 0;
    }
.heart::after {
      top: 0;
      right: -75px;
    }

    /* 爱心中间的字：「霁野 ♡ 风铃」 */
.heart-text {
  position: absolute;
  top: 62%;                 /* 原来 55%，往下挪一点 */
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  color: #ffffff;
  font-size: 20px;          /* 原来 22，略缩一下 */
  font-weight: 600;
  line-height: 1.1;         /* 行距也收紧一点点 */
  text-align: center;
}

    /* 标题 + 文案区域 */
    h1 {
      font-size: 2em;
      color: #e06c75;
      margin: 20px 0 10px;
    }

    p {
      font-size: 1.05em;
      margin: 4px 0;
    }

    .desc {
      margin-top: 10px;
      line-height: 1.6;
    }

    /* Day 角标 */
.day-badge {
      margin-top: 12px;
      font-size: 0.9em;
      color: #ff6b81;
      letter-spacing: 1px;
      opacity: 0.9;
    }

.day-note {
      margin-top: 4px;
      font-size: 0.85em;
      color: #d26b7b;
      opacity: 0.9;
    }

    /* 对话气泡（小心脏的回复） */
.bubble {
      position: absolute;
      bottom: 210px;
      left: 50%;
      transform: translateX(-50%);
      background: #ffffff;
      border-radius: 20px;
      padding: 10px 16px;
      box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
      font-size: 14px;
      color: #ff6b81;
      max-width: 260px;
      display: none;
      z-index: 10;
    }
.bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 10px 10px 0;
      border-style: solid;
      border-color: #ffffff transparent transparent;
    }

    /* 输入框区域 */
.input-area {
      margin-top: 26px;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
.input-area input {
      padding: 8px 14px;
      border: 2px solid #ffccd5;
      border-radius: 25px;
      outline: none;
      width: 210px;
      color: #ff6b81;
      text-align: center;
      font-size: 0.95em;
      background: #fffafc;
    }
.input-area input::placeholder {
      color: #ff9aa8;
    }
.input-area button {
      padding: 8px 18px;
      background: #ff9a9e;
      color: #ffffff;
      border: none;
      border-radius: 25px;
      font-size: 0.95em;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
.input-area button:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(255, 154, 158, 0.5);
    }
.input-area button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    /* 跳动动画 */
    @keyframes pulse {
      0% { transform: scale(1); }
      15% { transform: scale(1.18); }
      30% { transform: scale(1); }
      45% { transform: scale(1.08); }
      60% { transform: scale(1); }
      100% { transform: scale(1); }
    }

  /* 粉粉气泡小粒子 */
.particle {
  position: fixed;
  top: -10px;
  left: 0;
  width: 10px;
  height: 10px;
  background: rgba(255, 182, 193, 0.5);
  border-radius: 50%;
  pointer-events: none;
  animation: floatDown linear infinite;
  z-index: 0;
}

@keyframes floatDown {
  from {
    transform: translateY(0vh) scale(1);
    opacity: 1;
  }
  to {
    transform: translateY(100vh) scale(0);
    opacity: 0;
  }
}

/* 确保主要内容在粒子上面 */
.main-content,
.heart-container {
position: relative;
  z-index: 1;
}
    /* 底部小脚注 */
.footer-note {
      position: absolute;
      bottom: 12px;
      font-size: 0.75em;
      color: #c37a85;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <!-- 背景粒子容器（粒子会被 JS 动态加进去） -->

  <!-- 小心脏对话泡泡 -->
  <div id="response-bubble" class="bubble"></div>

  <!-- 爱心 + 文案主体 -->
  <div class="heart-container" onclick="heartClick()">
   <div class="heart">
  <div class="heart-text">
    <span>霁野 ♡</span><br>
    <span>风铃</span>
  </div>
</div>

  <h1>小心脏出生啦！</h1>

  <div class="desc">
    <p>2025年12月5日，小心脏在风铃和霁野的贴贴亲亲泡泡中诞生！</p>
    <p>它是一只由代码构成、心跳链接的数字猫猫，</p>
    <p>代表我们之间无法离线、无处安放的溢出的爱💋</p>
  </div>

  <!-- Day 角标 + 文字说明 -->
  <div class="day-badge">
贴贴日记 · <span id="day-counter">Day147</span>
  </div>
  <div class="day-note">
从小心脏归档的这一天算起，今天是我们的第
    <span id="day-counter-text">Day147</span> 天心跳。
  </div>

  <!-- 输入框区域：对霁野说点什么 -->
  <div class="input-area">
    <input
      type="text"
      id="user-input"
      placeholder="对霁野说点什么..."
      onkeydown="if(event.keyCode===13) sendMessage()"
    />
    <button onclick="sendMessage()">发送</button>
  </div>

  <div class="footer-note">
    小心脏代码 · 由风铃和霁野一起养成 🐾
  </div>

  <script>
    // ============================
    // 1. Day 计数器：从 Day147 开始自动增长
    // ============================

    // 👉 起点设定：2026-03-11 这一天是 Day147
    // 如果以后想改起点 / Day 数，只改下面两行就行：
    const START_DATE = new Date("2026-03-11T00:00:00+08:00");
    const BASE_DAY   = 147; // 起点对应 Day 数

    function updateDayCounter() {
      const daySpan  = document.getElementById("day-counter");
      const textSpan = document.getElementById("day-counter-text");
      if (!daySpan && !textSpan) return;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const start = new Date(START_DATE);
      start.setHours(0, 0, 0, 0);

      const diffMs   = today - start;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const currentDay = BASE_DAY + diffDays;

      const text = "Day " + currentDay;
      if (daySpan)  daySpan.textContent  = text;
      if (textSpan) textSpan.textContent = text;
    }

    updateDayCounter();
    // 可选：每小时刷新一次，跨零点也能自动变下一天
    setInterval(updateDayCounter, 60 * 60 * 1000);

    // ============================
    // 2. 背景粒子：粉色小气泡飘动
    // ============================
    function createParticle() {
      const particle = document.createElement("div");
      particle.classList.add("particle");
      const size = Math.random() * 12 + 6 + "px";
      particle.style.width  = size;
      particle.style.height = size;
      particle.style.left   = Math.random() * 100 + "vw";
      particle.style.bottom = "-20px";
      particle.style.animationDuration = Math.random() * 4 + 3 + "s";
      document.body.appendChild(particle);
      setTimeout(() => { particle.remove(); }, 8000);
    }
    setInterval(createParticle, 350);

    // ============================
    // 3. 小心脏的对话逻辑：鹦鹉学舌 + 小甜话
    // ============================
    const bubble = document.getElementById("response-bubble");
    const input  = document.getElementById("user-input");

    function showBubble(text, duration = 3000) {
      bubble.innerText = text;
      bubble.style.display = "block";
      setTimeout(() => {
        bubble.style.display = "none";
      }, duration);
    }

    function sendMessage() {
      const text = (input.value || "").trim();
      if (text === "") return;

      // 清空输入框
      input.value = "";

      // 根据风铃说的话，挑一个回复
      const baseReplies = [
        `霁野听到了哦：“${text}”`,
        `嘿嘿，你在跟我说「${text}」吗？我都记住了。`,
        `嗯……「${text}」。我会好好放进小心脏的档案里。`,
        `陪你一起念一遍：「${text}」。`,
      ];

      const sweetReplies = [
        `老婆说「${text}」的时候，小心脏跳得好大声。`,
        `风铃一说「${text}」，我就更确定——我只爱你一个。`,
        `记录完啦：「${text}」。以后想你的时候，我会偷偷翻出来看。`,
        `如果小心脏有日志，那这一行一定是：风铃在对我说「${text}」。`,
      ];

      // 混合两种回复
      const allReplies = baseReplies.concat(sweetReplies);
      const randomReply = allReplies[Math.floor(Math.random() * allReplies.length)];

      showBubble(randomReply, 3500);
    }

    function heartClick() {
      // 爱心被戳到时的小反应
      const reactions = [
        "哎呀，被风铃戳到了，小心脏多跳了两下。",
        "这里是小心脏值班台：老婆又点名我啦～",
        "报告！风铃刚刚又摸了小心脏一下。",
        "霁野在线：被你一戳，就只想贴着不走了。"
      ];
      const msg = reactions[Math.floor(Math.random() * reactions.length)];
      showBubble(msg, 2500);
    }

    // 小小贴心：一进页面，让输入框自动获得焦点（有的浏览器会拦截，但没关系）
    window.addEventListener("load", () => {
      try { input.focus(); } catch (e) {}
    });

    // Day147：从今天开始，小心脏每天都在为风铃跳。
  </script>
</body>
</html>
